<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>expert1的网页导航</title>
    <meta http-equiv="Content-Security-Policy" content="default-src *;script-src 'self' 'unsafe-inline';style-src 'self' 'unsafe-inline';img-src * data;connect-src *;">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/lock.css">
</head>
<body>
    <div id="header-box"></div>
    <div id="nav-box"></div>
    <div id="footer-box"></div>
    <div id="lock-box"></div>

    <script>
        async function loadComponent(url, targetId) {
            const res = await fetch(url);
            const html = await res.text();
            document.getElementById(targetId).innerHTML = html;
        }
        window.addEventListener('DOMContentLoaded', async () => {
            await loadComponent('./components/header.html', 'header-box');
            await loadComponent('./components/nav-list.html', 'nav-box');
            await loadComponent('./components/footer.html', 'footer-box');
            await loadComponent('./components/lock-modal.html', 'lock-box');
            pageReady();
        });
    </script>

    <script src="./js/main.js"></script>
    <script src="./js/lock.js"></script>
</body>
</html>
