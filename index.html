<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>expert1的网页导航</title>
    <meta http-equiv="Content-Security-Policy" content="default-src *;script-src 'self' 'unsafe-inline';style-src 'self' 'unsafe-inline';img-src * data;connect-src *;">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/lock.css">
</head>
<body>
    <div id="header-box"></div>
    <div id="nav-box"></div>
    <div id="footer-box"></div>
    <div id="lock-box"></div>

    <!-- 先加载密码锁JS，提前挂载handleUnlock全局函数 -->
    <script src="./js/lock.js"></script>
    <!-- 再加载页面主逻辑 -->
    <script src="./js/main.js"></script>

    <!-- 并行加载所有组件，不互相阻塞 -->
    <script>
        async function loadComponent(url, targetId) {
            try {
                const res = await fetch(url);
                const html = await res.text();
                document.getElementById(targetId).innerHTML = html;
            } catch (err) {
                console.error("组件加载失败:", url, err);
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            // 并行加载，一个失败不影响其他模块显示
            Promise.all([
                loadComponent('./components/header.html', 'header-box'),
                loadComponent('./components/nav-list.html', 'nav-box'),
                loadComponent('./components/footer.html', 'footer-box'),
                loadComponent('./components/lock-modal.html', 'lock-box')
            ]).then(() => {
                // 全部组件渲染完成后再执行页面初始化
                pageReady();
            });
        });
    </script>
</body>
</html>
